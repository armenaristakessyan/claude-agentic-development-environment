<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="theme-color" content="#0d0d0d" />
    <title>Claude ADE</title>
    <script>
      // Prevent flash-of-wrong-theme: apply theme before any rendering
      (function() {
        var theme = localStorage.getItem('ade-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        var zoom = localStorage.getItem('ade-zoom');
        if (zoom) {
          var z = Number(zoom) / 100;
          document.documentElement.style.zoom = z;
          // Compensate zoom so the layout fits the actual viewport
          document.documentElement.style.height = (100 / z) + 'vh';
          document.documentElement.style.overflow = 'hidden';
        }
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'dark' ? '#0d0d0d' : '#f5f5f5');
      })();
    </script>
  </head>
  <body class="bg-root text-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

  </body>
</html>
